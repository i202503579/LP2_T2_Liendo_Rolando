<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Registrar Nueva Orden de Compra - Rolando Liendo</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">
				<h1 class="card-title text-center">Orden de compra nueva</h1>
				<div class="row d-flex justify-content-center">
					<div class="col-md-6">
						<form class="row g-2" th:action="@{/orden/registrar}"
							  th:object="${ordenCompra}" method="post" novalidate>

							<div class="col-md-6 position-relative">
								<label for="proveedor" class="form-label">Proveedor</label>
								<select class="form-select" id="proveedor"
										th:field="*{proveedor.idProveedor}" required>
									<option value="">--Seleccione--</option>
									<option th:each="p : ${lstProveedores}"
											th:value="${p.idProveedor}"
											th:text="${p.ruc + ' - ' + p.razonSocial}">
									</option>
								</select>
							</div>
							<div class="col-md-6 position-relative">
								<label for="monto" class="form-label">Monto</label>
								<input type="number" class="form-control" step="0.01"
									   placeholder="0.00" id="monto"
									   th:field="*{monto}" required>
							</div>
							<div class="col-md-12 position-relative">
								<label for="direccionEntrega" class="form-label">Dirección de entrega</label>
								<input type="text" class="form-control"
									   placeholder="Ingrese una dirección de entrega"
									   id="direccionEntrega" th:field="*{direccionEntrega}" required>
							</div>
							<div class="col-md-6 position-relative">
								<label for="fechaEntrega" class="form-label">Fecha de entrega</label>
								<input type="date" class="form-control" id="fechaEntrega"
									   th:field="*{fechaEntrega}" required>
							</div>
							<div class="col-md-6 position-relative">
								<label for="estado" class="form-label">Estado</label>
								<select class="form-select" id="estado" th:field="*{estado}">
									<option value="">--Seleccione--</option>
									<option value="P">Pendiente</option>
									<option value="C">Completado</option>
									<option value="A">Anulado</option>
								</select>
							</div>
							<div class="col-md-12 d-flex justify-content-between">
								<a th:href="@{/orden/listadoLiendo}" class="btn btn-outline-dark">
									<i class="fa-solid fa-reply"></i> Regresar
								</a>
								<button type="submit" class="btn btn-primary">
									<i class="fa-solid fa-floppy-disk"></i> Registrar
								</button>
								<button type="reset" class="btn btn-secondary">
									<i class="fa-solid fa-broom"></i> Limpiar
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
	<div th:if="${alert}" th:utext="${alert}"></div>
</body>

</html>
